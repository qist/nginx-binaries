          docker cp $(docker ps -l -q):/tmp/nginx_${VERSION}_${{ matrix.suffix }}.tar.gz .

      - name: Build macOS
        if: matrix.os == 'macos'
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          brew install pcre zlib
          
          git clone --depth=1 -b openssl-3.3.0 https://github.com/quictls/quictls.git
