          docker cp $(docker ps -l -q):/tmp/nginx_${VERSION}_${{ matrix.suffix }}.tar.gz .

      - name: Build directly (Ubuntu/Debian)
        if: (matrix.os == 'ubuntu' || matrix.os == 'debian') && matrix.use-docker != 'true'
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
