      - name: Setup MSYS2 UCRT64
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-libxslt
            mingw-w64-ucrt-x86_64-libtool
            autoconf
            automake
            git
            patch
            zip
            perl
            nasm

      - name: Build Windows
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          # 创建 mingw32-make 的别名 make
          ln -sf /ucrt64/bin/mingw32-make.exe /ucrt64/bin/make.exe
          git clone --depth=1 --recursive -b openssl-3.6.2 https://github.com/openssl/openssl.git
          git clone --depth=1 -b release-$VERSION https://github.com/nginx/nginx.git

          git clone --depth=1 --recursive https://github.com/simplresty/ngx_devel_kit.git
          git clone --depth=1 --recursive https://github.com/openresty/set-misc-nginx-module.git
          git clone --depth=1 --recursive https://github.com/yaoweibin/ngx_http_substitutions_filter_module.git
          git clone --depth=1 --recursive https://github.com/atomx/nginx-http-auth-digest.git
          git clone --depth=1 --recursive https://github.com/openresty/headers-more-nginx-module.git
          git clone --depth=1 --recursive https://github.com/aperezdc/ngx-fancyindex.git
          git clone --depth=1 --recursive -b pcre2-10.42 https://github.com/PCRE2Project/pcre2.git
          git clone --depth=1 --recursive -b v1.3.2 https://github.com/madler/zlib.git
          cd pcre2
          ./autogen.sh
          cd ../nginx
          ./auto/configure \
            --with-cc=gcc \
            --prefix= \
            --conf-path=conf/nginx.conf \
            --pid-path=logs/nginx.pid \
            --http-log-path=logs/access.log \
            --error-log-path=logs/error.log \
            --sbin-path=nginx.exe \
            --http-client-body-temp-path=temp/client_body_temp \
            --http-proxy-temp-path=temp/proxy_temp \
            --http-fastcgi-temp-path=temp/fastcgi_temp \
            --http-scgi-temp-path=temp/scgi_temp \
            --http-uwsgi-temp-path=temp/uwsgi_temp \
            --with-compat \
            --with-pcre=../pcre2 \
            --with-pcre-jit \
            --with-zlib=../zlib \
            --with-http_ssl_module \
            --with-http_stub_status_module \
            --with-http_realip_module \
            --with-http_auth_request_module \
            --with-http_addition_module \
            --with-http_gzip_static_module \
            --with-http_sub_module \
            --with-http_v2_module \
            --with-stream \
            --with-debug \
            --with-stream_ssl_module \
            --with-stream_realip_module \
            --with-stream_ssl_preread_module \
            --with-threads \
            --with-http_secure_link_module \
            --with-http_gunzip_module \
            --with-http_dav_module \
            --with-http_flv_module \
            --with-http_mp4_module \
            --with-http_random_index_module \
            --with-http_slice_module \
            --with-mail \
            --with-mail_ssl_module \
            --with-file-aio \
            --with-openssl-opt=enable-tls1_3 \
            --with-http_degradation_module \
            --with-openssl=../openssl \
            --with-openssl-opt='no-asm no-tests -D_WIN32_WINNT=0x0501' \
            --with-cc-opt="-I/ucrt64/include -I/ucrt64/include/libxml2 -I/ucrt64/include/libxslt -DFD_SETSIZE=32768" \
            --with-ld-opt="-L/ucrt64/lib" \
            --add-module=../ngx_devel_kit \
            --add-module=../set-misc-nginx-module \
            --add-module=../ngx_http_substitutions_filter_module \
            --add-module=../nginx-http-auth-digest \
            --add-module=../headers-more-nginx-module \
            --add-module=../ngx-fancyindex 
          mingw32-make -j$(nproc)
          # mingw32-make install
          # 修复 Windows 可执行文件扩展名
           mkdir -p /tmp/nginx
          if [ -f objs/nginx.exe ]; then
            \cp objs/nginx.exe /tmp/nginx/nginx.exe
          fi
           \cp -pdr conf /tmp/nginx/
           \cp -pdr docs/html /tmp/nginx/
          mkdir -p /tmp/nginx/logs
          mkdir -p /tmp/nginx/temp/client_body_temp
          mkdir -p /tmp/nginx/temp/proxy_temp
          mkdir -p /tmp/nginx/temp/fastcgi_temp
          mkdir -p /tmp/nginx/temp/scgi_temp
          mkdir -p /tmp/nginx/temp/uwsgi_temp
          ls /tmp/nginx/
          cd /tmp
          zip -r $GITHUB_WORKSPACE/nginx_${VERSION}_${{ matrix.suffix }}.zip nginx/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx_${{ needs.check-version.outputs.new_version }}_${{ matrix.suffix }}
          path: nginx_${{ needs.check-version.outputs.new_version }}_${{ matrix.suffix }}.*

  release:
    name: Create Release
    needs: [check-version, build]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nginx_${{ needs.check-version.outputs.new_version }}_*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: Nginx ${{ needs.check-version.outputs.new_version }}
          body: |
            Auto-built nginx ${{ needs.check-version.outputs.new_version }} binaries for multiple platforms.
            
            ## Included Modules
            - HTTP/3 (QUIC) support via QuicTLS
            - Headers more
            - VTS (Virtual host traffic status)
            - And more...
            
            ## Platforms
            - Ubuntu (amd64, arm64)
            - Debian (amd64, arm64)
            - Red Hat / CentOS / Rocky Linux / AlmaLinux (amd64, arm64)
            - Alpine (amd64, arm64)
            - macOS (amd64, arm64)
            - Windows (amd64)
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}