            git clone --depth=1 --recursive https://github.com/arut/nginx-dav-ext-module.git && \
            git clone --depth=1 --recursive https://github.com/google/ngx_brotli.git && \
            git clone --depth=1 --recursive https://github.com/aperezdc/ngx-fancyindex.git && \
            cd nginx && \
