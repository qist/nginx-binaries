            --add-module=../headers-more-nginx-module \
            --add-module=../nginx-module-vts \
            --add-module=../nginx-dav-ext-module \
            --add-module=../ngx_brotli \
            --add-module=../ngx-fancyindex \
            --user=nginx \
            --group=nginx
          make -j$(sysctl -n hw.ncpu)
          make install
          cd /tmp
          tar czf nginx_${VERSION}_${{ matrix.suffix }}.tar.gz nginx/
          cp nginx_${VERSION}_${{ matrix.suffix }}.tar.gz $GITHUB_WORKSPACE

      - name: Build Windows
        if: matrix.os == 'windows'
        run: |
          $VERSION = "${{ needs.check-version.outputs.new_version }}"
          choco install -y winflexbison3 pcre zlib patch
          
          git clone --depth=1 -b openssl-3.3.0 https://github.com/quictls/quictls.git
          git clone --depth=1 -b release-$VERSION https://github.com/nginx/nginx.git
          git clone --depth=1 --recursive https://github.com/openresty/set-misc-nginx-module.git
          git clone --depth=1 --recursive https://github.com/yaoweibin/ngx_http_substitutions_filter_module.git
          git clone --depth=1 --recursive https://github.com/atomx/nginx-http-auth-digest.git
          git clone --depth=1 --recursive https://github.com/xiaokai-wang/nginx_upstream_check_module.git
          git clone --depth=1 --recursive https://github.com/FRiCKLE/ngx_cache_purge.git
          git clone --depth=1 --recursive https://github.com/weibocom/nginx-upsync-module.git
          git clone --depth=1 --recursive https://github.com/openresty/echo-nginx-module.git
          git clone --depth=1 --recursive https://github.com/evanmiller/mod_zip.git
          git clone --depth=1 --recursive https://github.com/wdaike/ngx_upstream_jdomain.git
          git clone --depth=1 --recursive https://github.com/GUI/nginx-upstream-dynamic-servers.git
          git clone --depth=1 --recursive https://github.com/openresty/headers-more-nginx-module.git
          git clone --depth=1 --recursive https://github.com/vozlt/nginx-module-vts.git
          git clone --depth=1 --recursive https://github.com/arut/nginx-dav-ext-module.git
          git clone --depth=1 --recursive https://github.com/google/ngx_brotli.git
          git clone --depth=1 --recursive https://github.com/aperezdc/ngx-fancyindex.git
          
          cd nginx
          Get-Content ..\nginx_upstream_check_module\check_1.12.1+.patch | patch -p1
          .\auto\configure `
            --prefix=C:\nginx `
            --with-compat `
            --with-pcre-jit `
            --with-http_ssl_module `
            --with-http_v3_module `
            --with-http_stub_status_module `
            --with-http_realip_module `
            --with-openssl=..\quictls `
            --add-module=..\set-misc-nginx-module `
            --add-module=..\ngx_http_substitutions_filter_module `
            --add-module=..\nginx-http-auth-digest `
            --add-module=..\nginx_upstream_check_module `
            --add-module=..\ngx_cache_purge `
            --add-module=..\nginx-upsync-module `
            --add-module=..\echo-nginx-module `
            --add-module=..\mod_zip `
            --add-module=..\ngx_upstream_jdomain `
            --add-module=..\nginx-upstream-dynamic-servers `
            --add-module=..\headers-more-nginx-module `
            --add-module=..\nginx-module-vts `
            --add-module=..\nginx-dav-ext-module `
            --add-module=..\ngx_brotli `
            --add-module=..\ngx-fancyindex `
            --user=nginx `
            --group=nginx
          nmake
          nmake install
          cd C:\
          Compress-Archive -Path nginx -DestinationPath nginx_${VERSION}_${{ matrix.suffix }}.zip
          cp C:\nginx_${VERSION}_${{ matrix.suffix }}.zip $env:GITHUB_WORKSPACE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx_${{ needs.check-version.outputs.new_version }}_${{ matrix.suffix }}
          path: nginx_${{ needs.check-version.outputs.new_version }}_${{ matrix.suffix }}.*

  release:
    name: Create Release
    needs: [check-version, build]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nginx_${{ needs.check-version.outputs.new_version }}_*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: Nginx ${{ needs.check-version.outputs.new_version }}
          body: |
            Auto-built nginx ${{ needs.check-version.outputs.new_version }} binaries for multiple platforms.
            
            ## Included Modules
            - HTTP/3 (QUIC) support via QuicTLS
            - Brotli compression
            - Headers more
            - VTS (Virtual host traffic status)
            - And more...
            
            ## Platforms
            - Ubuntu (amd64, arm64)
            - Debian (amd64, arm64)
            - Red Hat / CentOS / Rocky Linux / AlmaLinux (amd64, arm64)
            - Alpine (amd64, arm64)
            - macOS (amd64, arm64)
            - Windows (amd64)
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
