name: Auto Build Nginx Multi-Platform

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨检查
  workflow_dispatch:
    inputs:
      version:
        description: 'Nginx version to build (e.g., 1.31.1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  check-version:
    name: Check for new nginx version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest nginx release from GitHub
        id: get-nginx-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            LATEST_TAG="release-${{ github.event.inputs.version }}"
          else
            # 使用 releases/latest API 获取最新稳定版本
            LATEST_TAG=$(curl -s https://api.github.com/repos/nginx/nginx/releases/latest | jq -r '.tag_name')
          fi
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "Error: Failed to get latest nginx version"
            exit 1
          fi
          
          echo "latest_nginx_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest nginx tag: $LATEST_TAG"

      - name: Check if we already have this version
        id: check
        run: |
          LATEST_TAG=${{ steps.get-nginx-version.outputs.latest_nginx_tag }}
          VERSION=$(echo $LATEST_TAG | sed 's/release-//')
          
          if git tag | grep -q "v$VERSION"; then
            echo "Version $VERSION already exists, skipping build"
            echo "new_version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version $VERSION found, starting build"
            echo "new_version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build nginx ${{ needs.check-version.outputs.new_version }} ${{ matrix.os }} ${{ matrix.arch }}
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # # Ubuntu amd64
          # - os: ubuntu
          #   arch: amd64
          #   runs-on: ubuntu-latest
          #   suffix: ubuntu_amd64
          #   use-docker: false

          # # Ubuntu arm64 (使用 QEMU)
          # - os: ubuntu
          #   arch: arm64
          #   runs-on: ubuntu-latest
          #   suffix: ubuntu_arm64
          #   use-docker: true
          #   docker-image: ubuntu:22.04

          # # Debian amd64
          # - os: debian
          #   arch: amd64
          #   runs-on: ubuntu-latest
          #   use-docker: false
          #   suffix: debian_amd64

          # # Debian arm64 (使用 QEMU)
          # - os: debian
          #   arch: arm64
          #   runs-on: ubuntu-latest
          #   suffix: debian_arm64
          #   use-docker: true
          #   docker-image: debian:12

          # # Red Hat amd64
          # - os: redhat
          #   arch: amd64
          #   runs-on: ubuntu-latest
          #   suffix: redhat_amd64
          #   use-docker: true
          #   docker-image: rockylinux:8

          # # Red Hat arm64 (使用 QEMU)
          # - os: redhat
          #   arch: arm64
          #   runs-on: ubuntu-latest
          #   suffix: redhat_arm64
          #   use-docker: true
          #   docker-image: rockylinux:8

          # # Alpine amd64
          # - os: alpine
          #   arch: amd64
          #   runs-on: ubuntu-latest
          #   suffix: alpine_amd64
          #   use-docker: true
          #   docker-image: alpine:latest

          # # Alpine arm64 (使用 QEMU)
          # - os: alpine
          #   arch: arm64
          #   runs-on: ubuntu-latest
          #   suffix: alpine_arm64
          #   use-docker: true
          #   docker-image: alpine:latest

          # macOS amd64 (Intel - 使用原生 intel 运行器)
          - os: macos
            arch: amd64
            runs-on: macos-15-intel
            suffix: macos_amd64

          # macOS arm64 (原生 Apple Silicon)
          - os: macos
            arch: arm64
            runs-on: macos-15
            suffix: macos_arm64

          # Windows amd64
          - os: windows
            arch: amd64
            runs-on: windows-latest
            suffix: windows_amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set QEMU for cross-compilation
        if: matrix.arch == 'arm64' && matrix.use-docker
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set Docker Buildx
        if: matrix.use-docker
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker (Alpine)
        if: matrix.use-docker && matrix.os == 'alpine'
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          docker run --rm --platform linux/${{ matrix.arch }} -v $PWD:/workspace -w /workspace ${{ matrix.docker-image }} \
            sh -c "apk update && apk add build-base pcre-dev zlib-dev git patch libxml2-dev libxslt-dev perl automake libtool cmake linux-headers && 
            git clone --depth=1 -b openssl-3.3.0 https://github.com/quictls/quictls.git && \
            git clone --depth=1 -b release-$VERSION https://github.com/nginx/nginx.git && \
            git clone --depth=1 --recursive https://github.com/simplresty/ngx_devel_kit.git && \
            git clone --depth=1 --recursive https://github.com/openresty/set-misc-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/yaoweibin/ngx_http_substitutions_filter_module.git && \
            git clone --depth=1 --recursive https://github.com/atomx/nginx-http-auth-digest.git && \
            git clone --depth=1 --recursive https://github.com/xiaokai-wang/nginx_upstream_check_module.git && \
            git clone --depth=1 --recursive https://github.com/FRiCKLE/ngx_cache_purge.git && \
            git clone --depth=1 --recursive https://github.com/weibocom/nginx-upsync-module.git && \
            git clone --depth=1 --recursive https://github.com/openresty/echo-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/evanmiller/mod_zip.git && \
            git clone --depth=1 --recursive https://github.com/wdaike/ngx_upstream_jdomain.git && \
            git clone --depth=1 --recursive https://github.com/GUI/nginx-upstream-dynamic-servers.git && \
            git clone --depth=1 --recursive https://github.com/openresty/headers-more-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/vozlt/nginx-module-vts.git && \
            git clone --depth=1 --recursive https://github.com/arut/nginx-dav-ext-module.git && \
            git clone --depth=1 --recursive https://github.com/aperezdc/ngx-fancyindex.git && \
            git clone --depth=1 --recursive https://github.com/google/ngx_brotli.git && \
            cd ngx_brotli/deps/brotli && \
            mkdir -p out && cd out && \
            cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=./installed .. && \
            cmake --build . --config Release --target brotlienc && \
            make install && \
            cd ../../../../nginx && \
            patch -p1 < ../nginx_upstream_check_module/check_1.20.1+.patch && \
            ./auto/configure \
              --prefix=/tmp/nginx \
              --with-compat \
              --with-pcre-jit \
              --with-http_ssl_module \
              --with-http_v3_module \
              --with-http_stub_status_module \
              --with-http_realip_module \
              --with-http_gzip_static_module \
              --with-http_sub_module \
              --with-http_addition_module \
              --with-http_dav_module \
              --with-http_flv_module \
              --with-http_mp4_module \
              --with-http_gunzip_module \
              --with-http_random_index_module \
              --with-http_secure_link_module \
              --with-http_degradation_module \
              --with-http_slice_module \
              --with-threads \
              --with-stream \
              --with-stream_ssl_module \
              --with-stream_realip_module \
              --with-openssl=/workspace/quictls \
              --add-module=/workspace/ngx_devel_kit \
              --add-module=/workspace/set-misc-nginx-module \
              --add-module=/workspace/ngx_http_substitutions_filter_module \
              --add-module=/workspace/nginx-http-auth-digest \
              --add-module=/workspace/nginx_upstream_check_module \
              --add-module=/workspace/ngx_cache_purge \
              --add-module=/workspace/nginx-upsync-module \
              --add-module=/workspace/echo-nginx-module \
              --add-module=/workspace/mod_zip \
              --add-module=/workspace/ngx_upstream_jdomain \
              --add-module=/workspace/nginx-upstream-dynamic-servers \
              --add-module=/workspace/headers-more-nginx-module \
              --add-module=/workspace/nginx-module-vts \
              --add-module=/workspace/nginx-dav-ext-module \
              --add-module=/workspace/ngx_brotli \
              --add-module=/workspace/ngx-fancyindex \
              --user=nginx \
              --group=nginx && \
            make -j$(nproc) && \
            make install && \
            cd /tmp && tar czf /workspace/nginx_${VERSION}_${{ matrix.suffix }}.tar.gz nginx/"

      - name: Build with Docker (Red Hat)
        if: matrix.use-docker && matrix.os == 'redhat'
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          docker run --rm --platform linux/${{ matrix.arch }} -v $PWD:/workspace -w /workspace ${{ matrix.docker-image }} \
            bash -c "yum update -y && yum install -y gcc make pcre-devel zlib-devel git patch libxml2-devel libxslt-devel perl perl-IPC-Cmd cmake && \
            git clone --depth=1 -b openssl-3.3.0 https://github.com/quictls/quictls.git && \
            git clone --depth=1 -b release-$VERSION https://github.com/nginx/nginx.git && \
            git clone --depth=1 --recursive https://github.com/simplresty/ngx_devel_kit.git && \
            git clone --depth=1 --recursive https://github.com/openresty/set-misc-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/yaoweibin/ngx_http_substitutions_filter_module.git && \
            git clone --depth=1 --recursive https://github.com/atomx/nginx-http-auth-digest.git && \
            git clone --depth=1 --recursive https://github.com/xiaokai-wang/nginx_upstream_check_module.git && \
            git clone --depth=1 --recursive https://github.com/FRiCKLE/ngx_cache_purge.git && \
            git clone --depth=1 --recursive https://github.com/weibocom/nginx-upsync-module.git && \
            git clone --depth=1 --recursive https://github.com/openresty/echo-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/evanmiller/mod_zip.git && \
            git clone --depth=1 --recursive https://github.com/wdaike/ngx_upstream_jdomain.git && \
            git clone --depth=1 --recursive https://github.com/GUI/nginx-upstream-dynamic-servers.git && \
            git clone --depth=1 --recursive https://github.com/openresty/headers-more-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/vozlt/nginx-module-vts.git && \
            git clone --depth=1 --recursive https://github.com/arut/nginx-dav-ext-module.git && \
            git clone --depth=1 --recursive https://github.com/aperezdc/ngx-fancyindex.git && \
            git clone --depth=1 --recursive https://github.com/google/ngx_brotli.git && \
            cd ngx_brotli/deps/brotli && \
            mkdir -p out && cd out && \
            cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=./installed .. && \
            cmake --build . --config Release --target brotlienc && \
            make install && \
            cd ../../../../nginx && \
            patch -p1 < ../nginx_upstream_check_module/check_1.20.1+.patch && \
            ./auto/configure \
              --prefix=/tmp/nginx \
              --with-compat \
              --with-pcre-jit \
              --with-http_ssl_module \
              --with-http_v3_module \
              --with-http_stub_status_module \
              --with-http_realip_module \
              --with-http_gzip_static_module \
              --with-http_sub_module \
              --with-http_addition_module \
              --with-http_dav_module \
              --with-http_flv_module \
              --with-http_mp4_module \
              --with-http_gunzip_module \
              --with-http_random_index_module \
              --with-http_secure_link_module \
              --with-http_degradation_module \
              --with-http_slice_module \
              --with-threads \
              --with-stream \
              --with-stream_ssl_module \
              --with-stream_realip_module \
              --with-openssl=/workspace/quictls \
              --add-module=/workspace/ngx_devel_kit \
              --add-module=/workspace/set-misc-nginx-module \
              --add-module=/workspace/ngx_http_substitutions_filter_module \
              --add-module=/workspace/nginx-http-auth-digest \
              --add-module=/workspace/nginx_upstream_check_module \
              --add-module=/workspace/ngx_cache_purge \
              --add-module=/workspace/nginx-upsync-module \
              --add-module=/workspace/echo-nginx-module \
              --add-module=/workspace/mod_zip \
              --add-module=/workspace/ngx_upstream_jdomain \
              --add-module=/workspace/nginx-upstream-dynamic-servers \
              --add-module=/workspace/headers-more-nginx-module \
              --add-module=/workspace/nginx-module-vts \
              --add-module=/workspace/nginx-dav-ext-module \
              --add-module=/workspace/ngx_brotli \
              --add-module=/workspace/ngx-fancyindex \
              --user=nginx \
              --group=nginx && \
            make -j$(nproc) && \
            make install && \
            cd /tmp && tar czf /workspace/nginx_${VERSION}_${{ matrix.suffix }}.tar.gz nginx/"

      - name: Build directly (Ubuntu/Debian)
        if: (matrix.os == 'ubuntu' || matrix.os == 'debian') && !matrix.use-docker
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre3-dev zlib1g-dev git patch libxml2-dev libxslt1-dev cmake
          
          git clone --depth=1 -b openssl-3.3.0 https://github.com/quictls/quictls.git
          git clone --depth=1 -b release-$VERSION https://github.com/nginx/nginx.git
          git clone --depth=1 --recursive https://github.com/simplresty/ngx_devel_kit.git
          git clone --depth=1 --recursive https://github.com/openresty/set-misc-nginx-module.git
          git clone --depth=1 --recursive https://github.com/yaoweibin/ngx_http_substitutions_filter_module.git
          git clone --depth=1 --recursive https://github.com/atomx/nginx-http-auth-digest.git
          git clone --depth=1 --recursive https://github.com/xiaokai-wang/nginx_upstream_check_module.git
          git clone --depth=1 --recursive https://github.com/FRiCKLE/ngx_cache_purge.git
          git clone --depth=1 --recursive https://github.com/weibocom/nginx-upsync-module.git
          git clone --depth=1 --recursive https://github.com/openresty/echo-nginx-module.git
          git clone --depth=1 --recursive https://github.com/evanmiller/mod_zip.git
          git clone --depth=1 --recursive https://github.com/wdaike/ngx_upstream_jdomain.git
          git clone --depth=1 --recursive https://github.com/GUI/nginx-upstream-dynamic-servers.git
          git clone --depth=1 --recursive https://github.com/openresty/headers-more-nginx-module.git
          git clone --depth=1 --recursive https://github.com/vozlt/nginx-module-vts.git
          git clone --depth=1 --recursive https://github.com/arut/nginx-dav-ext-module.git
          git clone --depth=1 --recursive https://github.com/google/ngx_brotli.git
          cd ngx_brotli/deps/brotli
          mkdir -p out && cd out
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=./installed ..
          cmake --build . --config Release --target brotlienc
          make install
          cd ../../../..
          git clone --depth=1 --recursive https://github.com/aperezdc/ngx-fancyindex.git
          
          cd nginx
          patch -p1 < ../nginx_upstream_check_module/check_1.20.1+.patch
          ./auto/configure \
            --prefix=/tmp/nginx \
            --with-compat \
            --with-pcre-jit \
            --with-http_ssl_module \
            --with-http_v3_module \
            --with-http_stub_status_module \
            --with-http_realip_module \
            --with-http_gzip_static_module \
            --with-http_sub_module \
            --with-http_addition_module \
            --with-http_dav_module \
            --with-http_flv_module \
            --with-http_mp4_module \
            --with-http_gunzip_module \
            --with-http_random_index_module \
            --with-http_secure_link_module \
            --with-http_degradation_module \
            --with-http_slice_module \
            --with-threads \
            --with-stream \
            --with-stream_ssl_module \
            --with-stream_realip_module \
            --with-openssl=../quictls \
            --add-module=../ngx_devel_kit \
            --add-module=../set-misc-nginx-module \
            --add-module=../ngx_http_substitutions_filter_module \
            --add-module=../nginx-http-auth-digest \
            --add-module=../nginx_upstream_check_module \
            --add-module=../ngx_cache_purge \
            --add-module=../nginx-upsync-module \
            --add-module=../echo-nginx-module \
            --add-module=../mod_zip \
            --add-module=../ngx_upstream_jdomain \
            --add-module=../nginx-upstream-dynamic-servers \
            --add-module=../headers-more-nginx-module \
            --add-module=../nginx-module-vts \
            --add-module=../nginx-dav-ext-module \
            --add-module=../ngx_brotli \
            --add-module=../ngx-fancyindex \
            --user=nginx \
            --group=nginx
          make -j$(nproc)
          make install
          cd /tmp
          tar czf nginx_${VERSION}_${{ matrix.suffix }}.tar.gz nginx/
          cp nginx_${VERSION}_${{ matrix.suffix }}.tar.gz $GITHUB_WORKSPACE

      - name: Build with Docker (Ubuntu/Debian arm64)
        if: (matrix.os == 'ubuntu' || matrix.os == 'debian') && matrix.use-docker
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          docker run --rm --platform linux/${{ matrix.arch }} -v $PWD:/workspace -w /workspace ${{ matrix.docker-image }} \
            bash -c "apt-get update && apt-get install -y build-essential libpcre3-dev zlib1g-dev git patch libxml2-dev libxslt1-dev cmake && \
            git clone --depth=1 -b openssl-3.3.0 https://github.com/quictls/quictls.git && \
            git clone --depth=1 -b release-$VERSION https://github.com/nginx/nginx.git && \
            git clone --depth=1 --recursive https://github.com/simplresty/ngx_devel_kit.git && \
            git clone --depth=1 --recursive https://github.com/openresty/set-misc-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/yaoweibin/ngx_http_substitutions_filter_module.git && \
            git clone --depth=1 --recursive https://github.com/atomx/nginx-http-auth-digest.git && \
            git clone --depth=1 --recursive https://github.com/xiaokai-wang/nginx_upstream_check_module.git && \
            git clone --depth=1 --recursive https://github.com/FRiCKLE/ngx_cache_purge.git && \
            git clone --depth=1 --recursive https://github.com/weibocom/nginx-upsync-module.git && \
            git clone --depth=1 --recursive https://github.com/openresty/echo-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/evanmiller/mod_zip.git && \
            git clone --depth=1 --recursive https://github.com/wdaike/ngx_upstream_jdomain.git && \
            git clone --depth=1 --recursive https://github.com/GUI/nginx-upstream-dynamic-servers.git && \
            git clone --depth=1 --recursive https://github.com/openresty/headers-more-nginx-module.git && \
            git clone --depth=1 --recursive https://github.com/vozlt/nginx-module-vts.git && \
            git clone --depth=1 --recursive https://github.com/arut/nginx-dav-ext-module.git && \
            git clone --depth=1 --recursive https://github.com/aperezdc/ngx-fancyindex.git && \
            git clone --depth=1 --recursive https://github.com/google/ngx_brotli.git && \
            cd ngx_brotli/deps/brotli && \
            mkdir -p out && cd out && \
            cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=./installed .. && \
